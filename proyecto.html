<<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>FNAF Web - Menú Principal</title>
  <style>
    body {
      margin: 0;
      background: url('menu-background.jpg') center/cover no-repeat;
      font-family: 'Courier New', monospace;
      color: #0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    #menu {
      background: rgba(0, 0, 0, 0.7);
      padding: 40px;
      border: 3px solid #0f0;
      text-align: center;
      width: 400px;
    }
    h1 {
      margin-bottom: 30px;
      font-size: 32px;
      color: #0f0;
    }
    button {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 15px;
      font-size: 18px;
      background: #000;
      color: #0f0;
      border: 2px solid #0f0;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #0f0;
      color: #000;
    }
  </style>
</head>
<body>
  <div id="menu">
    <h1>FNAF Web</h1>
    <button onclick="startGame()">Comenzar Noche</button>
    <button onclick="showInstructions()">Instrucciones</button>
    <button onclick="exitGame()">Salir</button>
  </div>

  <script>
    function startGame() {
      window.location.href = "index.html"; // redirige al juego principal
    }

    function showInstructions() {
      alert("Usa las cámaras para vigilar los pasillos.\nControla las puertas para protegerte.\n¡Sobrevive hasta las 6 AM!");
    }

    function exitGame() {
      alert("Gracias por jugar. ¡Vuelve pronto!");
    }
  </script>
  <style>
    body {
      margin: 0;
      background-color: #000;
      color: #0f0;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    #game {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #camera-feed {
      flex: 1;
      background: url('pasillo1.jpg') center/cover no-repeat;
      border: 3px solid #0f0;
      position: relative;
    }
    #controls {
      display: flex;
      justify-content: space-around;
      background: #111;
      padding: 10px;
      border-top: 2px solid #0f0;
    }
    button {
      background: #000;
      color: #0f0;
      border: 2px solid #0f0;
      padding: 10px 20px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #0f0;
      color: #000;
    }
    #status {
      position: absolute;
      bottom: 10px;
      left: 10px;
      font-size: 14px;
      background: rgba(0,0,0,0.5);
      padding: 5px;
    }
  </style>
</head>
<body>
  <div id="game">
    <div id="camera-feed">
      <div id="status">Cámara 1 - Pasillo Principal</div>
    </div>
  <div id="controls">
  <button onclick="changeCamera(1)">Cámara 1</button>
  <button onclick="changeCamera(2)">Cámara 2</button>
  <button onclick="changeCamera(3)">Cámara 3</button>
  <button onclick="showOffice()">Bajar Cámara</button>
  <button onclick="toggleDoor('left')">Puerta Izquierda</button>
  <button onclick="toggleDoor('right')">Puerta Derecha</button>
</div>

<script>
  const cameraFeed = document.getElementById('camera-feed');
  const status = document.getElementById('status');
  let doors = { left: false, right: false };

  function changeCamera(num) {
    const pasillos = {
      1: { img: 'https://i.redd.it/wimke1xyzfec1.jpeg', name: 'Pasillo Principal' },
      2: { img: 'https://im.ziffdavisinternational.com/ign_es/screenshot/default/fnaf4_5u3s.jpg', name: 'Pasillo Lateral' },
      3: { img: 'https://sm.ign.com/ign_es/screenshot/default/fnaf2_mzsf.jpg', name: 'Pasillo Oscuro' }
    };
    cameraFeed.style.backgroundImage = `url('${pasillos[num].img}')`;
    status.textContent = `Cámara ${num} - ${pasillos[num].name}`;
  }

  function showOffice() {
    cameraFeed.style.backgroundImage = `url('https://copilot.microsoft.com/th/id/BCO.4301968f-1268-4bb1-a126-766c134d68c7.png')`;
    status.textContent = `Oficina del Guardia`;
  }

  function toggleDoor(side) {
    doors[side] = !doors[side];
    alert(`Puerta ${side} ${doors[side] ? 'cerrada' : 'abierta'}`);
  }
</script>
</body>
</html>
